name: iOS CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build and test (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The runner's default Xcode ships with a matching iOS simulator
      # runtime; pinning an older Xcode leaves it without a usable runtime.
      - name: Show versions
        run: |
          xcodebuild -version
          xcrun simctl list devices available | head -20

      - name: Build
        run: >
          xcodebuild
          -project Soma.xcodeproj
          -scheme Soma
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro'
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Test
        run: >
          xcodebuild
          -project Soma.xcodeproj
          -scheme Soma
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro'
          CODE_SIGNING_ALLOWED=NO
          test
